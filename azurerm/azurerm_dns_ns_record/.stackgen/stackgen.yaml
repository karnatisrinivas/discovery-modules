version: 1.0

representation:
  side_panel:
    label: "DNS - NS Record"
  node:
    label:
      static: "DNS - NS Record"
      template: ${name}
    display_type: default

discovery:
  type: azurerm_dns_ns_record
  dnd_supported: false
  references:
    zone_name:
      from: azurerm_dns_zone
      output: name
