version: 1.0

representation:
  side_panel:
    label: Firewall Policy Rule Collection Group
  node:
    label:
      static: Firewall Policy Rule Collection Group
      template: ${name}
    display_type: default

discovery:
  type: azurerm_firewall_policy_rule_collection_group
  dnd_supported: false
  references:
    firewall_policy_id:
      from: azurerm_firewall_policy
      output: id
