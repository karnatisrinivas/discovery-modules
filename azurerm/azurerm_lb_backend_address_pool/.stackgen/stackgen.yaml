version: 1.0

representation:
  side_panel:
    label: Load Balancer Backend Address Pool
  node:
    label:
      static: Load Balancer Backend Address Pool
      template: ${name}
    display_type: default

discovery:
  type: azurerm_lb_backend_address_pool
  dnd_supported: false
  data_source: data_azurerm_lb_backend_address_pool
  references:
    loadbalancer_id:
      from: azurerm_loadbalancer
      output: id
