version: 1.0

representation:
  side_panel:
    label: Mssql Database
  node:
    label:
      static: Mssql Database
      template: ${name}
    display_type: default

discovery:
  type: azurerm_mssql_database
  dnd_supported: false
  references:
    elastic_pool_id:
      from: azurerm_mssql_elasticpool
      output: id
    transparent_data_encryption_key_vault_key_id:
      from: azurerm_key_vault_key
      output: id
    server_id:
      from: azurerm_mssql_server
      output: id
