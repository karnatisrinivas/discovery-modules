version: 1.0

representation:
  side_panel:
    label: AzureAD Service Principal
  node:
    label:
      static: AzureAD Service Principal
      template: AzureAD Service Principal
    display_type: default

variables:
  feature_tags:
    description: Feature tags configuration for the service principal
    attributes: 
      hide: 
        type: bool
        options: 
          - true
          - false
        ui_control: select
        label: Hide
        validation: 
          required: false
          dataType: bool
      custom_single_sign_on: 
        validation: 
          dataType: bool
          required: false
        type: bool
        options: 
          - true
          - false
        ui_control: select
        label: "Custom Single Sign-On"
      enterprise: 
        label: Enterprise
        validation: 
          dataType: bool
          required: false
        type: bool
        options: 
          - true
          - false
        ui_control: select
      gallery: 
        label: Gallery
        validation: 
          required: false
          dataType: bool
        type: bool
        options: 
          - true
          - false
        ui_control: select
  account_enabled:
    type: bool
    options: 
      - true
      - false
    ui_control: select
    description: Whether or not the service principal account is enabled
  app_role_assignment_required:
    description: Whether the service principal has app role assignment enabled
    type: bool
    options: 
      - true
      - false
    ui_control: select
  use_existing:
    description: When true, any existing service principal linked to the same application will be automatically imported
    type: bool
    options: 
      - true
      - false
    ui_control: select
  preferred_single_sign_on_mode:
    description: "The single sign-on mode configured for this application"
    type: string
    options: 
      - password
      - saml
      - none
      - oidc
      - notSupported
    ui_control: select

discovery:
  type: azuread_service_principal
  dnd_supported: false
  data_source: data_azuread_service_principal
