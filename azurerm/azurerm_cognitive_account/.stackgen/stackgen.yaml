version: 1.0

representation:
  side_panel:
    label: Cognitive
  node:
    label:
      static: Cognitive
      template: ${name}
    display_type: default

variables:
  kind:
    description: Specifies the type of Cognitive Service Account that should be created. Changing this forces a new resource to be created.
    type: string
    options: 
      - Academic
      - AnomalyDetector
      - Bing.Autosuggest
      - Bing.Autosuggest.v7
      - Bing.CustomSearch
      - Bing.Search
      - Bing.Search.v7
      - Bing.Speech
      - Bing.SpellCheck
      - Bing.SpellCheck.v7
      - CognitiveServices
      - ComputerVision
      - ContentModerator
      - ContentSafety
      - CustomSpeech
      - CustomVision.Prediction
      - CustomVision.Training
      - Emotion
      - Face
      - FormRecognizer
      - ImmersiveReader
      - LUIS
      - LUIS.Authoring
      - MetricsAdvisor
      - OpenAI
      - Personalizer
      - QnAMaker
      - Recommendations
      - SpeakerRecognition
      - Speech
      - SpeechServices
      - SpeechTranslation
      - TextAnalytics
      - TextTranslation
      - WebLM
    ui_control: select
  sku_name:
    ui_control: select
    description: Specifies the SKU Name for this Cognitive Service Account. Changing this forces a new resource to be created
    type: string
    options: 
      - F0
      - F1
      - S0
      - S
      - S1
      - S2
      - S3
      - S4
      - S5
      - S6
      - P0
      - P1
      - P2
      - E0
      - DC0
  public_network_access_enabled:
    description: Whether public network access is allowed for the Cognitive Account
    type: bool
    options: 
      - true
      - false
    ui_control: select

discovery:
  type: azurerm_cognitive_account
  dnd_supported: false
