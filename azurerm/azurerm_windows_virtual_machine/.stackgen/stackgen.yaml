version: 1.0

representation:
  side_panel:
    label: Windows Virtual Machine
  node:
    label:
      static: Windows Virtual Machine
      template: ${name}
    display_type: default

variables:
  enable_automatic_updates:
    description: Specifies if Automatic Updates are Enabled for the Windows Virtual Machine. Changing this forces a new resource to be created.
    type: bool
    options: 
      - true
      - false
    ui_control: select
  additional_capabilities:
    description: Block for additional capabilities
    attributes: 
      ultra_ssd_enabled: 
        label: Ultra SSD Enabled
        description: "Should the capacity to enable Data Disks of the UltraSSD_LRS storage account type be supported on this Virtual Machine?"
        validation: 
          required: false
          dataType: bool
        type: bool
        options: 
          - true
          - false
        ui_control: select
      hibernation_enabled: 
        label: Hibernation Enabled
        description: Whether to enable the hibernation capability or not.
        validation: 
          required: false
          dataType: bool
        type: bool
        options: 
          - true
          - false
        ui_control: select
  disk_controller_type:
    description: Specifies the Disk Controller Type used for this Virtual Machine.
    type: string
    options: 
      - SCSI
      - NVMe
    ui_control: select
  vtpm_enabled:
    description: "Specifies if vTPM (virtual Trusted Platform Module) and Trusted Launch is enabled for the Virtual Machine. "
    type: bool
    options: 
      - true
      - false
    ui_control: select
  termination_notification:
    description: A os_image_notification block as defined below.
    attributes: 
      enabled: 
        label: Enabled
        validation: 
          required: true
          dataType: bool
        type: bool
        options: 
          - true
          - false
        ui_control: select
  patch_mode:
    description: "Specifies the mode of in-guest patching to this Windows Virtual Machine."
    type: string
    options: 
      - Manual
      - AutomaticByOS
      - AutomaticByPlatform
    ui_control: select
  os_disk:
    description: Configuration for OS Disk
    attributes: 
      caching: 
        label: Caching
        description: The Type of Caching which should be used for the Internal OS Disk.
        validation: 
          required: true
          dataType: string
        type: string
        options: 
          - None
          - ReadOnly
          - ReadWrite
        ui_control: select
      storage_account_type: 
        description: The Type of Storage Account which should back this the Internal OS Disk.
        validation: 
          required: true
          dataType: string
        type: string
        options: 
          - Standard_LRS
          - StandardSSD_LRS
          - Premium_LRS
          - StandardSSD_ZRS
          - Premium_ZRS
        ui_control: select
        label: Storage Account Type
      security_encryption_type: 
        label: Security Encryption Type
        description: Encryption Type when the Virtual Machine is a Confidential VM.
        validation: 
          dataType: string
          required: false
        type: string
        options: 
          - VMGuestStateOnly
          - DiskWithVMGuestState
        ui_control: select
      write_accelerator_enabled: 
        label: Write Accelerator Enabled
        description: "Should Write Accelerator be Enabled for this OS Disk?"
        validation: 
          required: false
          dataType: bool
        type: bool
        options: 
          - true
          - false
        ui_control: select
  provision_vm_agent:
    description: "Should the Azure VM Agent be provisioned on this Virtual Machine?"
    type: bool
    options: 
      - true
      - false
    ui_control: select
  bypass_platform_safety_checks_on_user_schedule_enabled:
    ui_control: select
    description: Specifies whether to skip platform scheduled patching when a user schedule is associated with the VM.
    type: bool
    options: 
      - true
      - false
  reboot_setting:
    ui_control: select
    description: Specifies the reboot setting for platform scheduled patching.
    type: string
    options: 
      - Always
      - IfRequired
      - Never
  encryption_at_host_enabled:
    description: "Should all of the disks (including the temp disk) attached to this Virtual Machine be encrypted by enabling Encryption at Host?"
    type: bool
    options: 
      - true
      - false
    ui_control: select
  additional_unattend_content:
    description: One or more additional_unattend_content blocks
    attributes: 
      setting: 
        label: Setting
        description: The name of the setting to which the content applies.
        validation: 
          required: true
          dataType: string
        type: string
        options: 
          - AutoLogon
          - FirstLogonCommands
        ui_control: select
  hotpatching_enabled:
    description: "Should the VM be patched without requiring a reboot?"
    type: bool
    options: 
      - true
      - false
    ui_control: select
  identity:
    attributes: 
      type: 
        label: Type
        validation: 
          required: false
          dataType: string
        type: string
        options: 
          - SystemAssigned
          - UserAssigned
          - SystemAssigned, UserAssigned
        ui_control: select
  winrm_listener:
    description: One or more winrm_listener blocks
    attributes: 
      protocol: 
        label: Protocol
        validation: 
          required: true
          dataType: bool
        type: bool
        options: 
          - Http
          - Https
        ui_control: select
  allow_extension_operations:
    description: "Should Extension Operations be allowed on this Virtual Machine?"
    type: bool
    options: 
      - true
      - false
    ui_control: select
  eviction_policy:
    options: 
      - Deallocate
      - Delete
    ui_control: select
    description: Specifies what should happen when the Virtual Machine is evicted for price reasons when using a Spot instance.
    type: string
  patch_assessment_mode:
    description: Specifies the mode of VM Guest Patching for the Virtual Machine.
    type: string
    options: 
      - AutomaticByPlatform
      - ImageDefault
    ui_control: select
  secure_boot_enabled:
    description: Specifies if Secure Boot and Trusted Launch is enabled for the Virtual Machine.
    type: bool
    options: 
      - true
      - false
    ui_control: select
  storage_account_type:
    options: 
      - Standard_LRS
      - StandardSSD_LRS
      - Premium_LRS
      - StandardSSD_ZRS
      - Premium_ZRS
    ui_control: select
  priority:
    type: string
    options: 
      - Regular
      - Spot
    ui_control: select
    description: Specifies the priority of this Virtual Machine.
  gallery_application:
    description: One or more gallery_application blocks
    attributes: 
      automatic_upgrade_enabled: 
        validation: 
          required: false
          dataType: bool
        type: bool
        options: 
          - true
          - false
        ui_control: select
        label: Automatic Upgrade Enabled
        description: Specifies whether the version will be automatically updated for the VM when a new Gallery Application version is available in PIR/SIG.
      treat_failure_as_deployment_failure_enabled: 
        type: bool
        options: 
          - true
          - false
        ui_control: select
        label: Treat Failure as Deployment Failure Enabled
        validation: 
          required: false
          dataType: bool
  license_type:
    type: string
    options: 
      - None
      - Windows_Client
      - Windows_Server
    ui_control: select
    description: "Specifies the type of on-premise license (also known as Azure Hybrid Use Benefit) which should be used for this Virtual Machine."
  vm_agent_platform_updates_enabled:
    type: bool
    options: 
      - true
      - false
    ui_control: select
    description: Specifies whether VMAgent Platform Updates is enabled.

discovery:
  type: azurerm_windows_virtual_machine
  dnd_supported: false
  references:
    availability_set_id:
      from: azurerm_availability_set
      output: id
    network_interface_ids:
      from: azurerm_network_interface
      output: id
    proximity_placement_group_id:
      from: azurerm_proximity_placement_group
      output: id
