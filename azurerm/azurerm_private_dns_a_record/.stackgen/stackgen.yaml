version: 1.0

representation:
  side_panel:
    label: Private DNS A Record
  node:
    label:
      static: Private DNS A Record
      template: ${name}
    display_type: default

discovery:
  type: azurerm_private_dns_a_record
  dnd_supported: false
  references:
    zone_name:
      from: data_azurerm_private_dns_zone
      output: name
