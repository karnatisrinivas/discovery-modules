version: 1.0

representation:
  side_panel:
    label: Linux Virtual Machine Scale Set
  node:
    label:
      static: Linux Virtual Machine Scale Set
      template: ${name}
    display_type: default

variables:
  caching:
    description: The caching type for the OS disk.
    type: string
    options: 
      - None
      - ReadOnly
      - ReadWrite
    ui_control: select
  storage_account_type:
    description: The storage account type for the OS disk.
    type: string
    options: 
      - Standard_LRS
      - StandardSSD_LRS
      - Premium_LRS
      - StandardSSD_ZRS
      - Premium_ZRS
    ui_control: select
  priority:
    description: Priority level of the VMs.
    type: string
    options: 
      - Regular
      - Spot
    ui_control: select
  upgrade_mode:
    description: Mode of upgrading the VMs.
    type: string
    options: 
      - Automatic
      - Manual
      - Rolling
    ui_control: select

discovery:
  type: azurerm_linux_virtual_machine_scale_set
  dnd_supported: false
