version: 1.0

representation:
  side_panel:
    label: Kubernetes Cluster Node Pool
  node:
    label:
      static: Kubernetes Cluster Node Pool
      template: ${node_pool_name}
    display_type: default

variables:
  spot_enabled:
    ui_control: select
    description: "Should this Node Pool be a spot instance pool?"
    type: bool
    options: 
      - true
      - false
  eviction_policy:
    description: The eviction policy for the Spot Node Pool. Possible values are Delete and Deallocate
    type: string
    options: 
      - Delete
      - Deallocate
    ui_control: select
  mode:
    options: 
      - System
      - User
    ui_control: select
    description: "Should this Node Pool be used for System or User resources?. Possible values are System and User"
    type: string
  enable_auto_scaling:
    description: "Should the Kubernetes Node Pool have auto scaling enabled?"
    type: bool
    options: 
      - true
      - false
    ui_control: select

variable_groups:
- label: Node Pool Details
  variables:
    - aks_cluster_resource_id
    - node_labels
    - node_taints
    - vm_size
- label: Autoscaling
  variables:
    - node_count
    - enable_auto_scaling
    - min_count
    - max_count
- label: Spot Enabled
  variables:
    - spot_enabled
    - eviction_policy
    - spot_max_price
- label: Tags
  variables:
    - tags

discovery:
  type: azurerm_aks_nodepool
  dnd_supported: false
  references:
    aks_cluster_resource_id:
      from: azurerm_aks
      output: cluster_id
