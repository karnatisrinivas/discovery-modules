version: 1.0

representation:
  side_panel:
    label: AzureAD Application
  node:
    label:
      static: AzureAD Application
      template: ${display_name}
    display_type: default

variables:
  fallback_public_client_enabled:
    ui_control: select
    description: Specifies whether the application is fallen back to public client
    type: bool
    options: 
      - true
      - false
  sign_in_audience:
    ui_control: select
    description: The Microsoft account types that are supported for the current application
    type: string
    options: 
      - AzureADMyOrg
      - AzureADMultipleOrgs
      - AzureADandPersonalMicrosoftAccount

discovery:
  type: azuread_application
  dnd_supported: false
  data_source: data_azuread_application
