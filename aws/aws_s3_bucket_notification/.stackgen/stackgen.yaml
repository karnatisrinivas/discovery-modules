version: 1.0

representation:
  side_panel:
    label: S3 Bucket Notification
  node:
    label:
      static: S3 Bucket Notification
      template: ${bucket}
    display_type: default

discovery:
  type: aws_s3_bucket_notification
  dnd_supported: false
  references:
    bucket:
      from: aws_s3_bucket
      output: id
