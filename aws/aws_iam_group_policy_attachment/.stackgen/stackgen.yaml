version: 1.0

representation:
  side_panel:
    label: IAM Group Policy Attachment
  node:
    label:
      static: IAM Group Policy Attachment
      template: ${group}
    display_type: default

discovery:
  type: aws_iam_group_policy_attachment
  dnd_supported: false
  references:
    group:
      from: aws_iam_group
      output: name
    policy_arn:
      from: aws_iam_policy
      output: arn
