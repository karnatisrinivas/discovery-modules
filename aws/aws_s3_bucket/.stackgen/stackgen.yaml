version: 1.0

representation:
  side_panel:
    label: S3 Bucket
  node:
    label:
      static: S3 Bucket
      template: ${bucket}
    display_type: default

variables:
  object_lock_enabled:
    type: bool
    options: 
      - true
      - false
    ui_control: select
    description: Enable object locking for this bucket. Object lock allows you to store objects using a write once, read many (WORM) model.
  force_destroy:
    description: Indicates all objects should be deleted from the bucket so that the bucket can be destroyed without error. These objects are not recoverable.
    type: bool
    options: 
      - true
      - false
    ui_control: select

discovery:
  type: aws_s3_bucket
  dnd_supported: false
  data_source: data_aws_s3_bucket
