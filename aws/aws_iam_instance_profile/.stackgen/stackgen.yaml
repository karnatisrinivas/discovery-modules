version: 1.0

representation:
  side_panel:
    label: IAM Instance Profile
  node:
    label:
      static: IAM Instance Profile
      template: ${name}
    display_type: default

discovery:
  type: aws_iam_instance_profile
  dnd_supported: false
  data_source: data_aws_iam_instance_profile
  references:
    role:
      from: aws_iam_role
      output: name
