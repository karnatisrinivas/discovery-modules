version: 1.0

representation:
  side_panel:
    label: Instance
  node:
    label:
      static: Instance
      template: Instance
    display_type: default

variables:
  hibernation:
    description: f true, the launched EC2 instance will support hibernation.
    type: bool
    options: 
      - true
      - false
    ui_control: select
  private_dns_name_options:
    description: Options for the instance hostname. The default values are inherited from the subnet.
    attributes: 
      enable_resource_name_dns_a_record: 
        type: bool
        ui_control: text
        label: Enable Resource Name DNS A Record
        validation: 
          required: false
          dataType: bool
      enable_resource_name_dns_aaaa_record: 
        label: Enable Resource Name DNS AAAA Record
        validation: 
          required: false
          dataType: bool
        type: bool
        ui_control: text
  disable_api_stop:
    type: bool
    options: 
      - true
      - false
    ui_control: select
    description: If true, enables EC2 Instance Stop Protection.
  get_password_data:
    type: bool
    options: 
      - true
      - false
    ui_control: select
    description: If true, wait for password data to become available and retrieve it. Useful for getting the administrator password for instances running Microsoft Windows.
  tenancy:
    description: "Tenancy of the instance (if the instance is running in a VPC). An instance with a tenancy of dedicated runs on single-tenant hardware. The host tenancy is not supported for the import-instance command."
    type: string
    options: 
      - default
      - dedicated
      - host
    ui_control: select
  disable_api_termination:
    ui_control: select
    description: If true, enables EC2 Instance Termination Protection.
    type: bool
    options: 
      - true
      - false
  network_interface:
    description: Customize network interfaces to be attached at instance boot time.
    attributes: 
      device_index: 
        label: Device Index
        validation: 
          required: true
          dataType: number
        type: number
        ui_control: text
      network_interface_id: 
        label: Network Interface ID
        validation: 
          required: true
          dataType: string
        type: string
        ui_control: text
  monitoring:
    options: 
      - true
      - false
    ui_control: select
    description: If true, the launched EC2 instance will have detailed monitoring enabled.
    type: bool
  ebs_optimized:
    description: "If true, the launched EC2 instance will be EBS-optimized. Note that if this is not set on an instance type that is optimized by default then this will show as disabled but if the instance type is optimized by default then there is no need to set this and there is no effect to disabling it."
    type: bool
    options: 
      - true
      - false
    ui_control: select
  instance_initiated_shutdown_behavior:
    description: Shutdown behavior for the instance.
    type: string
    options: 
      - stop
      - terminate
    ui_control: select
  source_dest_check:
    options: 
      - true
      - false
    ui_control: select
    description: Controls if traffic is routed to the instance when the destination address does not match the instance. Used for NAT or VPNs.
    type: bool
  user_data_replace_on_change:
    options: 
      - true
      - false
    ui_control: select
    description: "When used in combination with `User Data` or `User Data Base64` will trigger a destroy and recreate when set to true."
    type: bool
  associate_public_ip_address:
    options: 
      - true
      - false
    ui_control: select
    description: Whether to associate a public IP address with an instance in a VPC.
    type: bool

discovery:
  type: aws_instance
  dnd_supported: false
  data_source: data_aws_instance
  references:
    key_name:
      from: aws_key_pair
      output: key_name
    subnet_id:
      from: aws_subnet
      output: id
