version: 1.0

representation:
  side_panel:
    label: VPC Security Group Egress Rule
  node:
    label:
      static: VPC Security Group Egress Rule
      template: VPC Security Group Egress Rule
    display_type: default

variables:
  ip_protocol:
    description: "The IP protocol name or number. Use -1 to specify all protocols."
    type: string
    options: 
      - tcp
      - udp
      - icmp
      - icmpv6
      - "-1"
    ui_control: select

discovery:
  type: aws_vpc_security_group_egress_rule
  dnd_supported: false
  references:
    security_group_id:
      from: aws_security_group
      output: id
