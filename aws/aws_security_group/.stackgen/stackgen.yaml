version: 1.0

representation:
  side_panel:
    label: Security Group
  node:
    label:
      static: Security Group
      template: ${name}
    display_type: default

discovery:
  type: aws_security_group
  dnd_supported: false
  data_source: data_aws_security_group
  references:
    vpc_id:
      from: aws_vpc
      output: id
