version: 1.0

representation:
  side_panel:
    label: OpenSearch Domain
  node:
    label:
      static: OpenSearch Domain
      template: OpenSearch Domain
    display_type: default

variables:
  ebs_enabled:
    options: 
      - true
      - false
    ui_control: select
  volume_type:
    options: 
      - standard
      - gp2
      - gp3
      - io1
      - 
    ui_control: select
  engine_version:
    description: Elasticsearch version for the OpenSearch domain
    type: string
    options: 
      - OpenSearch_2.9
      - OpenSearch_2.7
      - OpenSearch_2.5
      - OpenSearch_2.3
      - OpenSearch_1.3
    ui_control: select
  enforce_https:
    options: 
      - true
      - false
    ui_control: select
  log_type:
    options: 
      - INDEX_SLOW_LOGS
      - SEARCH_SLOW_LOGS
      - AUDIT_LOGS
      - ES_APPLICATION_LOGS
    ui_control: select

discovery:
  type: aws_opensearch_domain
  dnd_supported: false
  data_source: data_aws_opensearch_domain
  references:
    cloudwatch_log_group_arn:
      from: aws_cloudwatch_log_group
      output: arn
