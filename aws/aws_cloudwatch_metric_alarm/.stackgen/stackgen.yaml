version: 1.0

representation:
  side_panel:
    label: CloudWatch Metric Alarm
  node:
    label:
      static: CloudWatch Metric Alarm
      template: ${alarm_name}
    display_type: default

variables:
  statistic:
    type: string
    options: 
      - SampleCount
      - Average
      - Sum
      - Minimum
      - Maximum
    ui_control: select
    description: "The statistic to apply to the alarm's associated metric."
  actions_enabled:
    ui_control: select
    description: "Indicates whether or not actions should be executed during any changes to the alarm's state."
    type: bool
    options: 
      - true
      - false
  evaluate_low_sample_count_percentiles:
    description: Used only for alarms based on percentiles. If you specify ignore, the alarm state will not change during periods with too few data points to be statistically significant. If you specify evaluate or omit this parameter, the alarm will always be evaluated and possibly change state no matter how many data points are available.
    type: string
    options: 
      - ignore
      - evaluate
    ui_control: select

discovery:
  type: aws_cloudwatch_metric_alarm
  dnd_supported: false
