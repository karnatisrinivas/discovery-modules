version: 1.0

representation:
  side_panel:
    label: Neptune Cluster Endpoint
  node:
    label:
      static: Neptune Cluster Endpoint
      template: ${cluster_endpoint_identifier}
    display_type: default

discovery:
  type: aws_neptune_cluster_endpoint
  dnd_supported: false
  references:
    cluster_identifier:
      from: aws_neptune_cluster
      output: id
