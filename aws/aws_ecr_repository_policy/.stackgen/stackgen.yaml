version: 1.0

representation:
  side_panel:
    label: ECR Repository Policy
  node:
    label:
      static: ECR Repository Policy
      template: ECR Repository Policy
    display_type: default

variables:
  policy:
    description: The policy document. This is a JSON formatted string. For more information about building IAM policy documents with Terraform, see the AWS IAM Policy Document Guide.
    type: string
    ui_control: json

discovery:
  type: aws_ecr_repository_policy
  dnd_supported: false
  references:
    repository:
      from: aws_ecr_repository
      output: name
