version: 1.0

representation:
  side_panel:
    label: Sagemaker Model
  node:
    label:
      static: Sagemaker Model
      template: ${name}
    display_type: default

discovery:
  type: aws_sagemaker_model
  dnd_supported: false
  references:
    execution_role_arn:
      from: aws_iam_role
      output: arn
