version: 1.0

representation:
  side_panel:
    label: Api Gateway Request Validator
  node:
    label:
      static: Api Gateway Request Validator
      template: ${name}
    display_type: default

discovery:
  type: aws_api_gateway_request_validator
  dnd_supported: false
  references:
    rest_api_id:
      from: aws_api_gateway_rest_api
      output: id
