version: 1.0

representation:
  side_panel:
    label: Neptune Cluster Snapshot
  node:
    label:
      static: Neptune Cluster Snapshot
      template: ${db_cluster_snapshot_identifier}
    display_type: default

discovery:
  type: aws_neptune_cluster_snapshot
  dnd_supported: false
  references:
    db_cluster_identifier:
      from: aws_neptune_cluster
      output: id
