version: 1.0

representation:
  side_panel:
    label: Redshift Usage Limit
  node:
    label:
      static: Redshift Usage Limit
      template: Redshift Usage Limit
    display_type: default

variables:
  feature_type:
    options: 
      - spectrum
      - "concurrency-scaling"
      - "cross-region-datasharing"
    ui_control: select
    description: The Amazon Redshift feature that you want to limit.
    type: string
  limit_type:
    description: "The type of limit. Depending on the feature type, this can be based on a time duration or data size. If FeatureType is spectrum, then LimitType must be data-scanned. If FeatureType is concurrency-scaling, then LimitType must be time. If FeatureType is cross-region-datasharing, then LimitType must be data-scanned. "
    type: string
    options: 
      - time
      - "data-scanned"
    ui_control: select
  period:
    type: string
    options: 
      - daily
      - weekly
      - monthly
    ui_control: select
    description: The time period that the amount applies to. A weekly period begins on Sunday.
  breach_action:
    ui_control: select
    description: The action that Amazon Redshift takes when the limit is reached.
    type: string
    options: 
      - log
      - "emit-metric"
      - disable

discovery:
  type: aws_redshift_usage_limit
  dnd_supported: false
  references:
    cluster_identifier:
      from: aws_redshift_cluster
      output: cluster_identifier
