      static: Access Context Manager Service Perimeter Resource
      template: ${perimeter_name}
    display_type: default

discovery:
  type: google_access_context_manager_service_perimeter_resource
  dnd_supported: false
  references:
    perimeter_name:
      from: google_access_context_manager_service_perimeter
      output: name
