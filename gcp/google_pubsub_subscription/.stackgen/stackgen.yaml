version: 1.0

representation:
  side_panel:
    label: PubSub Subscription
  node:
    label:
      static: PubSub Subscription
      template: ${name}
    display_type: default

discovery:
  type: google_pubsub_subscription
  dnd_supported: false
  references:
    topic:
      from: google_pubsub_topic
      output: name
