version: 1.0

representation:
  side_panel:
    label: Bigtable Instance Iam Binding
  node:
    label:
      static: Bigtable Instance Iam Binding
      template: ${instance}
    display_type: default

discovery:
  type: google_bigtable_instance_iam_binding
  dnd_supported: false
  references:
    instance:
      from: google_bigtable_instance
      output: id
