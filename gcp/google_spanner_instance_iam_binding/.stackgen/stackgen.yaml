version: 1.0

representation:
  side_panel:
    label: Spanner Instance Iam Binding
  node:
    label:
      static: Spanner Instance Iam Binding
      template: ${instance}
    display_type: default

discovery:
  type: google_spanner_instance_iam_binding
  dnd_supported: false
  references:
    instance:
      from: google_spanner_instance
      output: id
