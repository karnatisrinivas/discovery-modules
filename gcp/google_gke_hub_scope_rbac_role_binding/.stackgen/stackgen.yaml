version: 1.0

representation:
  side_panel:
    label: Scope RBAC Role Binding
  node:
    label:
      static: Scope RBAC Role Binding
      template: ${scope_rbac_role_binding_id}
    display_type: default

variables:
  predefined_role:
    options: 
      - UNKNOWN
      - ADMIN
      - EDIT
      - VIEW
    ui_control: select
    description: PredefinedRole is an ENUM representation of the default Kubernetes Roles
    type: string

discovery:
  type: google_gke_hub_scope_rbac_role_binding
  dnd_supported: false
  references:
    scope_id:
      from: google_gke_hub_scope
      output: scope_id
