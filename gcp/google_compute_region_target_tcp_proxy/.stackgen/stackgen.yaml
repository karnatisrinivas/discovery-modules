version: 1.0

representation:
  side_panel:
    label: Compute Region Target Tcp Proxy
  node:
    label:
      static: Compute Region Target Tcp Proxy
      template: ${name}
    display_type: default

discovery:
  type: google_compute_region_target_tcp_proxy
  dnd_supported: false
  references:
    backend_service:
      from: google_compute_region_backend_service
      output: id
