version: 1.0

representation:
  side_panel:
    label: Compute Router Peer
  node:
    label:
      static: Compute Router Peer
      template: ${name}
    display_type: default

discovery:
  type: google_compute_router_peer
  dnd_supported: false
  references:
    router:
      from: google_compute_router
      output: name
