version: 1.0

representation:
  side_panel:
    label: Apigee Environment Iam Binding
  node:
    label:
      static: Apigee Environment Iam Binding
      template: ${env_id}
    display_type: default

discovery:
  type: google_apigee_environment_iam_binding
  dnd_supported: false
  references:
    env_id:
      from: google_apigee_environment
      output: name
