version: 1.0

representation:
  side_panel:
    label: Kms Crypto Key Iam Member
  node:
    label:
      static: Kms Crypto Key Iam Member
      template: ${crypto_key_id}
    display_type: default

discovery:
  type: google_kms_crypto_key_iam_member
  dnd_supported: false
  references:
    crypto_key_id:
      from: google_kms_crypto_key
      output: id
