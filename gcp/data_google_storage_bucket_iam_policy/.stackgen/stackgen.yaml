version: 1.0

representation:
  side_panel:
    label: "[Data] Storage Bucket Iam Policy"
  node:
    label:
      static: "[Data] Storage Bucket Iam Policy"
      template: ${bucket}
    display_type: default

discovery:
  type: data_google_storage_bucket_iam_policy
  dnd_supported: false
  references:
    bucket:
      from: google_storage_bucket
      output: name
