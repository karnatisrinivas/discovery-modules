version: 1.0

representation:
  side_panel:
    label: Vpc Access Connector
  node:
    label:
      static: Vpc Access Connector
      template: ${name}
    display_type: default

discovery:
  type: google_vpc_access_connector
  dnd_supported: false
  references:
    network:
      from: google_compute_network
      output: self_link
