version: 1.0

representation:
  side_panel:
    label: Apigee Envgroup
  node:
    label:
      static: Apigee Envgroup
      template: ${name}
    display_type: default

discovery:
  type: google_apigee_envgroup
  dnd_supported: false
  references:
    org_id:
      from: google_apigee_organization
      output: id
