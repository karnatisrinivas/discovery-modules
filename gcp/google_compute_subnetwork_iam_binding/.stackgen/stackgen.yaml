version: 1.0

representation:
  side_panel:
    label: Compute Subnetwork Iam Binding
  node:
    label:
      static: Compute Subnetwork Iam Binding
      template: ${subnetwork}
    display_type: default

discovery:
  type: google_compute_subnetwork_iam_binding
  dnd_supported: false
  references:
    subnetwork:
      from: google_compute_subnetwork
      output: name
