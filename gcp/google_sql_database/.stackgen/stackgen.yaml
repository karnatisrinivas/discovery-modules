version: 1.0

representation:
  side_panel:
    label: SQL Database
  node:
    label:
      static: SQL Database
      template: ${name}
    display_type: default

variables:
  deletion_policy:
    description: "The deletion policy for the database. Setting ABANDON allows the resource to be abandoned rather than deleted. This is useful for Postgres, where databases cannot be deleted from the API if there are users other than cloudsqlsuperuser with access. Possible values are: ABANDON, DELETE"
    type: string
    options: 
      - ABANDON
      - DELETE
    ui_control: select

discovery:
  type: google_sql_database
  dnd_supported: false
  references:
    instance:
      from: google_sql_database_instance
      output: name
