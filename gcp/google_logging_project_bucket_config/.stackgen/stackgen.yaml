version: 1.0

representation:
  side_panel:
    label: Logging Project Bucket Config
  node:
    label:
      static: Logging Project Bucket Config
      template: ${bucket_id}
    display_type: default

variables:
  locked:
    description: Whether the bucket is locked. The retention period on a locked bucket cannot be changed. Locked buckets may only be deleted if they are empty.
    type: bool
    options: 
      - true
      - false
    ui_control: select
  enable_analytics:
    description: Whether or not Log Analytics is enabled. Logs for buckets with Log Analytics enabled can be queried in the Log Analytics page using SQL queries. Cannot be disabled once enabled and created.
    type: bool
    options: 
      - true
      - false
    ui_control: select

discovery:
  type: google_logging_project_bucket_config
  dnd_supported: false
